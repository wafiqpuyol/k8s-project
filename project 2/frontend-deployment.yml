apiVersion: apps/v1
kind: Deployment
metadata:
  name: project2-frontend-deployment
  namespace: Project2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: rollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: wiings09/passop-k8s-frontend:ip
          ports:
            - containerPort: 80
