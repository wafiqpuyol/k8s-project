apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

namePrefix: paytm-
nameSuffix: -prod
namespace: prod
labels:
  - pairs:
      env: prod
    includeSelectors: true
    includeTemplates: true

replicas:
  - name: deployment
    count: 5

patches:
  - target:
      group: "apps"
      version: v1
      kind: Deployment
      name: deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 9090
  - target:
      group: ""
      version: v1
      kind: Service
      name: service
    patch: |-
      - op: replace
        path: /spec/ports/0/port
        value: 9090
      - op: replace
        path: /spec/ports/0/targetPort
        value: 9090